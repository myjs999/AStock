<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AStock Mini</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e222d;
      color: #d1d4dc;
      height: 44px;
      display: flex;
      align-items: stretch;
      user-select: none;
      border: 1px solid #2a2e39;
      overflow: hidden;
    }

    #drag-area {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      -webkit-app-region: drag;
      cursor: move;
    }

    #sym {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      font-family: 'Consolas', 'Courier New', monospace;
      letter-spacing: 0.5px;
    }

    #price {
      font-size: 13px;
      font-family: 'Consolas', 'Courier New', monospace;
      color: #d1d4dc;
    }

    #pct {
      font-size: 13px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 600;
    }

    #placeholder {
      font-size: 12px;
      color: #4c525e;
    }

    #restore-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      border-left: 1px solid #2a2e39;
      color: #4c525e;
      font-size: 15px;
      cursor: pointer;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    #restore-btn:hover { background: #232736; color: #d1d4dc; }
  </style>
</head>
<body>
  <div id="drag-area">
    <span id="placeholder">No data loaded</span>
    <span id="sym"   style="display:none"></span>
    <span id="price" style="display:none"></span>
    <span id="pct"   style="display:none"></span>
  </div>
  <button id="restore-btn" title="Restore window">↗</button>

  <script>
    const symEl   = document.getElementById('sym');
    const priceEl = document.getElementById('price');
    const pctEl   = document.getElementById('pct');
    const phEl    = document.getElementById('placeholder');

    document.getElementById('restore-btn').addEventListener('click', () => {
      window.miniAPI.restore();
    });

    document.getElementById('drag-area').addEventListener('dblclick', () => {
      window.miniAPI.restore();
    });

    window.miniAPI.onData(d => {
      phEl.style.display    = 'none';
      symEl.style.display   = '';
      priceEl.style.display = '';
      pctEl.style.display   = '';

      symEl.textContent   = d.sym;
      priceEl.textContent = d.price;
      pctEl.textContent   = d.pct;
      pctEl.style.color   = d.up ? '#26a69a' : '#ef5350';
    });
  </script>
</body>
</html>
